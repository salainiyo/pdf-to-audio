name: PDF-TO-AUDIO BACKEND CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-code:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests with pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRATION: "60"
          REFRESH_TOKEN_EXPIRATION: "20"
          SECRET_KEY: "super-secret-test-key-for-ci-only"
        run: |
          cd backend
          
          # DEBUGGING: This prints the variables to your GitHub Actions log so you can verify they exist!
          echo "Checking environment variables..."
          echo "Database URL is: $DATABASE_URL"
          echo "Secret Key is: $SECRET_KEY"
          
          # Run the actual tests
          pytest